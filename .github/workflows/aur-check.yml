name: aur-check
on:
  workflow_dispatch:

jobs:
  discover-packages:
    name: Discover packages
    runs-on: aur-runners
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Export packages matrix JSON
        id: packages
        shell: bash
        run: |
          {
            echo 'packages<<EOF'
            cat packages.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  check-and-verify:
    name: Check and verify (${{ matrix.package.name }})
    runs-on: aur-runners
    needs: discover-packages
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover-packages.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Clone AUR
        env:
          PKGNAME: ${{ matrix.package.name }}
        shell: bash
        run: |
          mkdir -p .aur
          ls -l /home/runner/.ssh
          git clone --depth 1 "ssh://aur@aur.archlinux.org/${PKGNAME}.git" ".aur/${PKGNAME}"
      - name: Check upstream and verify PKGBUILD sources
        id: dagger_check
        env:
          PKGNAME: ${{ matrix.package.name }}
          NVCHECKER_NAME: ${{ matrix.package.nvcheckerName || '' }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        shell: bash
        run: |
          args=(check-and-verify-package --pkgname="$PKGNAME" --repo-dir=".aur/${PKGNAME}")

          if [[ -n "$NVCHECKER_NAME" ]]; then
            args+=(--nvchecker-name="$NVCHECKER_NAME")
          fi
          dagger call "${args[@]}" | tee result.json
          echo "changed=$(jq -r '.changed' result.json)" >> "$GITHUB_OUTPUT"

      - name: Commit and push when changed
        if: ${{ steps.dagger_check.outputs.changed == 'true' }}
        env:
          PKGNAME: ${{ matrix.package.name }}
        shell: bash
        run: |
          repo=".aur/${PKGNAME}"
          cd "$repo"

          if git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "Dagger reported changed=true, but PKGBUILD/.SRCINFO are unchanged. Skipping commit."
            exit 0
          fi

          git config user.name "aur-builder"
          git config user.email "aur-builder@bot.com"
          git add PKGBUILD .SRCINFO
          git commit -m "automated update"
          git push origin HEAD
