name: aur-check
on:
  workflow_dispatch:

jobs:
  discover-packages:
    name: Discover packages
    runs-on: aur-runners
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Export packages matrix JSON
        id: packages
        shell: bash
        run: |
          {
            echo 'packages<<EOF'
            cat packages.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  check-and-verify:
    name: Check and verify (${{ matrix.package.name }})
    runs-on: aur-runners
    needs: discover-packages
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover-packages.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Clone AUR
        env:
          PKGNAME: ${{ matrix.package.name }}
        shell: bash
        run: |
          mkdir -p .aur
          git clone --depth 1 "ssh://aur@aur.archlinux.org/${PKGNAME}.git" ".aur/${PKGNAME}"

      - name: Check upstream and verify PKGBUILD sources
        env:
          PKGNAME: ${{ matrix.package.name }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        shell: bash
        run: |
          dagger call check-and-verify-package \
            --pkgname="$PKGNAME" \
            --repo-dir=".aur/${PKGNAME}" \
            export --path=".aur/${PKGNAME}"

      - name: Detect changes
        id: diff
        env:
          PKGNAME: ${{ matrix.package.name }}
        shell: bash
        run: |
          cd ".aur/${PKGNAME}"
          if git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push when changed
        if: steps.diff.outputs.changed == 'true'
        env:
          PKGNAME: ${{ matrix.package.name }}
        shell: bash
        run: |
          cd ".aur/${PKGNAME}"
          git config user.name "aur-builder"
          git config user.email "aur-builder@bot.com"
          git add PKGBUILD .SRCINFO
          git commit -m "automated update"
          git push origin HEAD
