steps:
  - label: ":arch: aur-pkgbuild-update"
    agents:
      queue: "default"
    image: "ghcr.io/carteramesh/docker/aur-builder:latest"
    env:
      AUR_PUSH_CHANGES: "1"
    plugins:
      - kubernetes:
          podTemplate: aur-builder
    commands:
      - export HOME=/home/aur_builder
      - ls -l "$HOME/.ssh/id_ed25519"
      - ./pkgbuild-update.sh
